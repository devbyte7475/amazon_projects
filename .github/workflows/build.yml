name: Build Amazon BULK Tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller build.spec --clean

      - name: Create DMG (optional)
        run: |
          brew install create-dmg
          create-dmg --volname "Amazon BULK Tool" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon "AmazonBULK批量生成工具.app" 200 190 --hide-extension "AmazonBULK批量生成工具.app" --app-drop-link 600 185 "AmazonBULK-macOS.dmg" "dist/"
        continue-on-error: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmazonBULK-macOS
          path: |
            dist/AmazonBULK批量生成工具.app
            AmazonBULK-macOS.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows exe
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: Create ZIP archive
        run: |
          cd dist
          Compress-Archive -Path "AmazonBULK批量生成工具" -DestinationPath "AmazonBULK-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmazonBULK-Windows
          path: dist/AmazonBULK-Windows.zip
          retention-days: 30

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AmazonBULK-macOS
          path: ./macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AmazonBULK-Windows
          path: ./windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos/AmazonBULK-macOS.dmg
            windows/AmazonBULK-Windows.zip
          body: |
            # Amazon BULK 批量生成工具

            ## 下载说明
            - **macOS用户**: 下载 `AmazonBULK-macOS.dmg`，双击安装
            - **Windows用户**: 下载 `AmazonBULK-Windows.zip`，解压后运行

            ## 功能特性
            - ✅ SBV视频广告批量生成
            - ✅ SP商品广告批量生成
            - ✅ SP自动广告批量生成
            - ✅ SB_KW广告批量生成
            - ✅ 否定词根批量生成

            ## 系统要求
            - macOS 10.13+
            - Windows 10/11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
