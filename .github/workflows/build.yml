name: 统一打包所有子项目

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
    steps:
      - uses: actions/checkout@v4

      - name: 动态检测子项目
        id: detect
        run: |
          projects_json="["
          first=true
          for dir in */; do
            dir="${dir%/}"
            [ -f "$dir/requirements.txt" ] || continue
            entry_point=""
            if [ -f "$dir/build.spec" ]; then
              entry_point="build.spec"
            elif [ -f "$dir/$dir.spec" ]; then
              entry_point="$dir.spec"
            elif ls "$dir"/*.spec 1>/dev/null 2>&1; then
              entry_point=$(ls "$dir"/*.spec | head -1 | xargs basename)
            elif [ -f "$dir/main.py" ]; then
              entry_point="main.py"
            elif [ -f "$dir/$dir.py" ]; then
              entry_point="$dir.py"
            elif ls "$dir"/src/main.py 1>/dev/null 2>&1; then
              entry_point="src/main.py"
            else
              continue
            fi
            if [ "$first" = true ]; then
              first=false
            else
              projects_json+=","
            fi
            projects_json+="{\"name\":\"$dir\",\"entry\":\"$entry_point\"}"
            echo "检测到子项目: $dir (入口: $entry_point)"
          done
          projects_json+="]"
          echo "projects=$projects_json" >> "$GITHUB_OUTPUT"
          echo "项目列表: $projects_json"

  build:
    needs: detect-projects
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-projects.outputs.projects) }}
        os: [windows-latest, macos-latest]
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        working-directory: ${{ matrix.project.name }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 (spec文件)
        if: endsWith(matrix.project.entry, '.spec')
        working-directory: ${{ matrix.project.name }}
        run: pyinstaller ${{ matrix.project.entry }} --clean

      - name: 打包 (Python入口)
        if: "!endsWith(matrix.project.entry, '.spec')"
        working-directory: ${{ matrix.project.name }}
        run: pyinstaller --onefile --console -n ${{ matrix.project.name }} ${{ matrix.project.entry }}

      - name: 列出构建产物
        working-directory: ${{ matrix.project.name }}
        shell: bash
        continue-on-error: true
        run: |
          echo "=== dist/ 目录内容 ==="
          ls -laR dist/ 2>/dev/null || dir /s /b dist\ 2>/dev/null || echo "dist/ 目录不存在"

      - name: 打包Windows ZIP
        if: runner.os == 'Windows'
        working-directory: ${{ matrix.project.name }}
        shell: pwsh
        run: |
          $distPath = "dist"
          $projectName = "${{ matrix.project.name }}"
          $zipName = "${projectName}-Windows.zip"

          Write-Host "=== dist/ 内容 ==="
          Get-ChildItem -Path $distPath -Recurse | Select-Object FullName

          $exeFile = Get-ChildItem -Path $distPath -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exeFile) {
            Write-Host "找到EXE: $($exeFile.FullName)"
            $parentDir = $exeFile.DirectoryName
            Compress-Archive -Path "$parentDir\*" -DestinationPath $zipName
          } else {
            $subDir = Get-ChildItem -Path $distPath -Directory | Select-Object -First 1
            if ($subDir) {
              Write-Host "找到子目录: $($subDir.FullName)"
              Compress-Archive -Path "$($subDir.FullName)\*" -DestinationPath $zipName
            } else {
              Write-Host "压缩整个dist目录"
              Compress-Archive -Path "$distPath\*" -DestinationPath $zipName
            }
          }
          Write-Host "已生成: $zipName"
          Get-ChildItem $zipName

      - name: 打包macOS ZIP
        if: runner.os == 'macOS'
        working-directory: ${{ matrix.project.name }}
        shell: bash
        run: |
          project_name="${{ matrix.project.name }}"
          zip_name="${project_name}-macOS.zip"
          cd dist/

          echo "=== dist/ 内容 ==="
          ls -laR

          app_files=$(find . -name "*.app" -maxdepth 2 -type d 2>/dev/null || true)
          if [ -n "$app_files" ]; then
            for app in $app_files; do
              echo "打包 .app: $app"
              zip -r "../${zip_name}" "$app"
            done
          fi

          exe_files=$(find . -type f -perm -u+x -not -path "*.app/*" -maxdepth 3 2>/dev/null || true)
          if [ -n "$exe_files" ]; then
            for exe in $exe_files; do
              echo "打包可执行文件: $exe"
              zip -j "../${zip_name}" "$exe"
            done
          fi

          if [ -z "$app_files" ] && [ -z "$exe_files" ]; then
            echo "未找到 .app 或可执行文件，压缩整个dist目录"
            zip -r "../${zip_name}" .
          fi

          cd ..
          echo "已生成: ${zip_name}"
          ls -la "${zip_name}"

      - name: 上传构建产物 (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-windows
          path: ${{ matrix.project.name }}/${{ matrix.project.name }}-Windows.zip
          retention-days: 30

      - name: 上传构建产物 (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-macos
          path: ${{ matrix.project.name }}/${{ matrix.project.name }}-macOS.zip
          retention-days: 30

  release:
    needs: [detect-projects, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 列出产物
        run: find ./artifacts -type f | sort

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          body: |
            # Amazon Projects 统一发布

            ## 包含工具
            - **bulk_processor** - Amazon广告Bulk数据处理工具
            - **payment** - Amazon Payment数据处理工具
            - **bulk_creator** - Amazon BULK批量生成工具

            ## 下载说明
            - **Windows用户**: 下载 `*-Windows.zip`，解压后运行 .exe
            - **macOS用户**: 下载 `*-macOS.zip`，解压后使用 .app 或可执行文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
